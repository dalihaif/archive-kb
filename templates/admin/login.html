<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 档案智库</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; min-height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 400px; margin: 0 auto; }
        .login-header { background-color: #1A2A4A; color: white; border-radius: 12px 12px 0 0; padding: 30px 20px; text-align: center; }
        .login-header .brand { color: #D4A84B; }
        .login-body { background: white; border-radius: 0 0 12px 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <div class="login-header">
            <h4 class="mb-1"><i class="bi bi-archive me-2"></i><span class="brand">档案</span>智库</h4>
            <small class="opacity-75">管理员登录</small>
        </div>
        <div class="login-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} alert-dismissible fade show small">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="post">
                <div class="mb-3">
                    <label class="form-label small">用户名</label>
                    <input type="text" class="form-control" name="username" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label small">密码</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <button type="submit" class="btn w-100" style="background-color: #1A2A4A; color: white;">登 录</button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
